<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Sự Kiện</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .section { background: #fafafa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .btn-green { background-color: #34a853; }
        .btn-green:hover { background-color: #2b803e; }
        .result-box { margin-top: 15px; padding: 15px; border-radius: 5px; font-weight: bold; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        pre { font-family: 'Courier New', Courier, monospace; font-size: 15px; background: #282c34; color: #61dafb; padding: 15px; border-radius: 5px; overflow-x: auto;}
    </style>
</head>
<body>

<div class="container">
    <h1>🎟️ PHẦN MỀM CHECK-IN SỰ KIỆN</h1>

    <div class="section">
        <h2>📝 1. Đăng ký khách mời mới</h2>
        <div class="form-group"><input type="text" id="reg-name" placeholder="Nhập họ và tên..."></div>
        <div class="form-group"><input type="text" id="reg-phone" placeholder="Nhập số điện thoại..."></div>
        <div class="form-group"><input type="email" id="reg-email" placeholder="Nhập email..."></div>
        <div class="form-group">
            <select id="reg-ticket">
                <option value="Normal">Vé Thường (Normal) - Vào 1 người</option>
                <option value="VIP">Vé VIP - Vào tối đa 5 người</option>
            </select>
        </div>
        <button onclick="registerGuest()">ĐĂNG KÝ NGAY</button>
        <div id="reg-msg" class="result-box"></div>
    </div>

    <div class="section">
        <h2>✅ 2. Cổng Check-in</h2>
        <div class="form-group"><input type="text" id="chk-name" placeholder="Tên người check-in..."></div>
        <div class="form-group"><input type="text" id="chk-phone" placeholder="Số điện thoại..."></div>
        <div class="form-group">
            <label>Số người đi cùng (không tính bản thân):</label>
            <input type="number" id="chk-accompanying" value="0" min="0">
        </div>
        <button class="btn-green" onclick="checkinGuest()">THỰC HIỆN CHECK-IN</button>
        <div id="chk-msg" class="result-box"></div>
    </div>

    <div class="section">
        <h2>📊 3. Bảng Thống Kê</h2>
        <button style="background-color: #6c757d;" onclick="getDashboard()">🔄 Tải lại Thống Kê</button>
        <pre id="dash-msg">Bấm nút để tải dữ liệu...</pre>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/guests';

    // Hàm hiển thị thông báo
    function showMessage(elementId, message) {
        const el = document.getElementById(elementId);
        el.innerText = message;
        if(message.includes("❌") || message.includes("⚠️")) {
            el.className = "result-box error";
        } else {
            el.className = "result-box success";
        }
    }

    // GỌI API ĐĂNG KÝ
    async function registerGuest() {
        const data = {
            name: document.getElementById('reg-name').value,
            phone: document.getElementById('reg-phone').value,
            email: document.getElementById('reg-email').value,
            ticketType: document.getElementById('reg-ticket').value
        };

        try {
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const text = await response.text();
            showMessage('reg-msg', text);
            // Tự động làm mới bảng thống kê
            getDashboard();
        } catch (error) {
            showMessage('reg-msg', "❌ LỖI: Không thể kết nối tới Server!");
        }
    }

    // GỌI API CHECK-IN
    async function checkinGuest() {
        const data = {
            name: document.getElementById('chk-name').value,
            phone: document.getElementById('chk-phone').value,
            accompanying: parseInt(document.getElementById('chk-accompanying').value) || 0
        };

        try {
            const response = await fetch(`${API_URL}/checkin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const text = await response.text();
            showMessage('chk-msg', text);

            if(!text.includes("❌")) {
                // Tự động xóa form nếu check-in thành công
                document.getElementById('chk-name').value = '';
                document.getElementById('chk-phone').value = '';
                document.getElementById('chk-accompanying').value = '0';
                getDashboard(); // Tự động làm mới bảng thống kê
            }
        } catch (error) {
            showMessage('chk-msg', "❌ LỖI: Không thể kết nối tới Server!");
        }
    }

    // GỌI API DASHBOARD
    async function getDashboard() {
        try {
            const response = await fetch(`${API_URL}/dashboard`);
            const text = await response.text();
            document.getElementById('dash-msg').innerText = text;
        } catch (error) {
            document.getElementById('dash-msg').innerText = "❌ Không thể tải dữ liệu. Server đã bật chưa?";
        }
    }

    // Tải dashboard ngay khi vừa mở trang web
    window.onload = getDashboard;
</script>

</body>
</html>
